name: Sync Upstream & Build to GHCR

# Runs every 6 hours. If the upstream repo (anasty17/mirror-leech-telegram-bot)
# has new commits, this merges them into this fork's master, then builds and
# pushes the image to GHCR. If already up to date, the build is skipped.
on:
  schedule:
    - cron: "0 */6 * * *"        # top of every 6th hour (UTC)
  workflow_dispatch:            # manual run / one-shot verification

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # runawayvalley/mirror-leech-telegram-bot
  UPSTREAM: anasty17/mirror-leech-telegram-bot
  UPSTREAM_BRANCH: master
  BASE_BRANCH: master

permissions:
  contents: write     # needed to push the merge back to the fork
  packages: write     # needed to push the image to GHCR

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork (full history + upstream remote)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Register upstream remote
        run: git remote add upstream https://github.com/${{ env.UPSTREAM }}.git

      - name: Compute sync status (ancestry check)
        id: shas
        run: |
          git fetch upstream ${{ env.UPSTREAM_BRANCH }}
          BEFORE=$(git rev-parse origin/${{ env.BASE_BRANCH }})
          AFTER=$(git rev-parse upstream/${{ env.UPSTREAM_BRANCH }})
          echo "before=$BEFORE" >> "$GITHUB_OUTPUT"
          echo "after=$AFTER"   >> "$GITHUB_OUTPUT"
          # Fork needs an update only if upstream's tip is NOT already
          # contained in the fork (i.e. upstream is not an ancestor of origin).
          # A bare "BEFORE != AFTER" would be wrong: the fork has its own
          # commits on top of upstream, so the tips always differ.
          if git merge-base --is-ancestor upstream/${{ env.UPSTREAM_BRANCH }} origin/${{ env.BASE_BRANCH }}; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Fork already contains all upstream commits (upstream=$AFTER is an ancestor of fork=$BEFORE). Build skipped."
          else
            echo "updated=true"  >> "$GITHUB_OUTPUT"
            echo "::notice::Upstream has new commits not in fork ($BEFORE -> $AFTER). Merging & building."
          fi

      - name: Merge upstream into fork master (only if behind)
        if: steps.shas.outputs.updated == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge --no-ff --no-edit upstream/${{ env.UPSTREAM_BRANCH }}
          git push origin ${{ env.BASE_BRANCH }}

      # ---- Build & push to GHCR (only when there was an update) ----
      - name: Set up Docker Buildx
        if: steps.shas.outputs.updated == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.shas.outputs.updated == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        if: steps.shas.outputs.updated == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        if: steps.shas.outputs.updated == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print published image
        if: steps.shas.outputs.updated == 'true'
        run: echo "Published ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
